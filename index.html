<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cao Lãnh Tour Guide - Interactive Speaking System</title>
    <style>
        :root {
            --primary-color: #1b4d3e; /* Đồng Tháp Lotus Leaf Green */
            --primary-hover: #113327;
            --bg-color: #f4f7f5;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --accent-color: #e67e22;
            --success-color: #27ae60;
            --danger-color: #c0392b;
            --water-color: #2980b9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 12px;
            transition: background 0.5s ease;
        }

        .app-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 520px;
            width: 100%;
            text-align: center;
            border: 1px solid #e2ebf0;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        /* --- VISUAL ANIMATIONS (VFX) --- */
        .shake { animation: shakeAnim 0.4s ease-in-out; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        
        .splash-effect { animation: splashAnim 0.6s ease-out; }
        @keyframes splashAnim {
            0% { box-shadow: inset 0 0 0 0px var(--water-color); filter: brightness(1.4); }
            100% { box-shadow: inset 0 0 0 100px rgba(41, 128, 185, 0); filter: brightness(1); }
        }

        .flash-red { animation: flashRedAnim 0.4s ease-out; }
        @keyframes flashRedAnim { 0% { background: #fadbd8; } 100% { background: var(--card-bg); } }

        .flash-green { animation: flashGreenAnim 0.4s ease-out; }
        @keyframes flashGreenAnim { 0% { background: #d4efdf; } 100% { background: var(--card-bg); } }

        header h1 {
            font-size: 1.4rem;
            color: var(--primary-color);
            margin-bottom: 2px;
            letter-spacing: 0.5px;
        }

        header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .dashboard-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f0f4f1;
            padding: 8px 14px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid #e2ece4;
        }
        #score-val { color: var(--accent-color); font-size: 1rem; }
        #weather-val { color: #2980b9; }

        .media-container {
            width: 100%;
            height: 230px;
            background-color: #edf2f7;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 12px;
            border: 2px solid #e2ece4;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .character-bubble {
            background: #eef7f2;
            border-left: 4px solid var(--primary-color);
            padding: 14px;
            border-radius: 8px;
            text-align: left;
            margin-bottom: 12px;
        }

        .character-name {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .story-text {
            font-size: 0.95rem;
            line-height: 1.45;
        }

        .interaction-panel {
            background: #fffaf0;
            padding: 14px;
            border-radius: 12px;
            text-align: left;
            margin-bottom: 16px;
            border: 1px dashed #feebc8;
        }

        .interaction-panel p {
            font-weight: 700;
            margin-bottom: 8px;
            color: #dd6b20;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .option-line {
            margin: 8px 0;
            font-size: 0.9rem;
            color: #34495e;
            padding: 10px 12px;
            background: rgba(255,255,255,0.85);
            border-radius: 8px;
            border: 1px solid rgba(226, 116, 32, 0.15);
            line-height: 1.4;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option-line:hover {
            background: #fff;
            border-color: var(--accent-color);
            transform: translateX(4px);
        }

        .controls {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .voice-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            flex: 2;
            padding: 14px;
            font-size: 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(27, 77, 62, 0.2);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .voice-btn:disabled { background-color: #cbd5e0; cursor: not-allowed; }

        .utility-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid #dcdde1;
            padding: 12px;
            font-size: 0.85rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .utility-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .status-box {
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            background: #f8f9fa;
            width: 100%;
            border: 1px solid #e8ecef;
        }

        .status-active { color: var(--accent-color); font-weight: 600; animation: pulse 1.5s infinite; }
        .status-success { color: var(--success-color); font-weight: 600; }
        .status-error { color: var(--danger-color); font-weight: 600; }
        .transcript-zone { margin-top: 4px; font-size: 0.8rem; color: var(--text-muted); }
        .transcript-text { font-weight: bold; color: var(--danger-color); }

        #bgm-toggle-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255,255,255,0.9); border: 1px solid #1b4d3e;
            border-radius: 20px; padding: 4px 12px; font-size: 0.75rem; cursor: pointer; font-weight: bold;
        }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>

<div class="app-container" id="main-app">
    <button id="bgm-toggle-btn" onclick="toggleBGM()">🎵 BGM: Off</button>
    
    <header>
        <h1>🎙️ Cao Lãnh Tour Guide</h1>
        <p>Interactive English Branching System</p>
    </header>

    <div class="dashboard-bar">
        <div>⭐ Score: <span id="score-val">10/10</span></div>
        <div>🌤️ Weather: <span id="weather-val">Loading...</span></div>
    </div>
        
    <div class="media-container">
        <img id="scenery-img" src="" alt="Destination View">
    </div>

    <div class="character-bubble">
        <div class="character-name" id="speaker-label">Tourist (Mr. John)</div>
        <div id="story" class="story-text">...</div>
    </div>

    <div class="interaction-panel" id="interaction-box">
        <p id="panel-title">🔊 Speak Your Tour Presentation:</p>
        <div id="options-list"></div>
    </div>

    <div class="controls">
        <button id="back-btn" class="utility-btn" onclick="goBack()" disabled>⬅️ Undo</button>
        <button id="start-btn" class="voice-btn">
            <span id="btn-icon">🎙️</span> <span id="btn-text">Tap to Speak</span>
        </button>
        <button class="utility-btn" onclick="resetGame()">🔄 Reset</button>
    </div>
        
    <div class="status-box">
        <div id="status-text">Ready. Activate microphone to start.</div>
        <div class="transcript-zone">System heard: <span id="transcript-text" class="transcript-text">...</span></div>
    </div>
</div>

<script>
// --- CHỈNH SỬA & THIẾT KẾ LẠI BGM CHUẨN AUDIO CONTEXT ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let bgmInterval = null;
let isBGMOn = false;
let bgmTick = 0;

function toggleBGM() {
    isBGMOn = !isBGMOn;
    document.getElementById('bgm-toggle-btn').innerText = isBGMOn ? "🎵 BGM: Active" : "🎵 BGM: Off";
    if (isBGMOn) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        bgmInterval = setInterval(() => {
            const now = audioCtx.currentTime;
            // Tạo tổ hợp nốt guitar mộc mạc âm lượng cân bằng rõ ràng (G-Major Pentatonic)
            const bassline = [146.83, 164.81, 196.00, 220.00]; 
            const melody = [293.66, 329.63, 392.00, 440.00, 587.33];
            
            if (bgmTick % 4 === 0) {
                const oscB = audioCtx.createOscillator(); const gainB = audioCtx.createGain();
                oscB.type = 'triangle'; oscB.frequency.setValueAtTime(bassline[Math.floor(Math.random()*bassline.length)], now);
                gainB.gain.setValueAtTime(0, now); gainB.gain.linearRampToValueAtTime(0.12, now + 0.2);
                gainB.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
                oscB.connect(gainB); gainB.connect(audioCtx.destination);
                oscB.start(); oscB.stop(now + 1.9);
            }
            
            const oscM = audioCtx.createOscillator(); const gainM = audioCtx.createGain();
            oscM.type = 'sine'; oscM.frequency.setValueAtTime(melody[Math.floor(Math.random()*melody.length)], now);
            gainM.gain.setValueAtTime(0, now); gainM.gain.linearRampToValueAtTime(0.08, now + 0.08);
            gainM.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
            oscM.connect(gainM); gainM.connect(audioCtx.destination);
            oscM.start(); oscM.stop(now + 0.7);
            bgmTick++;
        }, 450);
    } else {
        clearInterval(bgmInterval);
    }
}

function playSFX(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;
    if (type === 'splash') {
        const bufferSize = audioCtx.sampleRate * 0.4;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 1000;
        const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.5, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
        noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
        noise.start(); noise.stop(now + 0.4);
    } else if (type === 'alert') {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(180, now);
        gain.gain.setValueAtTime(0.25, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.25);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.3);
    } else if (type === 'applause') {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(900, now); osc.frequency.exponentialRampToValueAtTime(1500, now + 0.3);
        gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.4);
    }
}

const sceneryImg = document.getElementById('scenery-img');
const storyText = document.getElementById('story');
const optionsList = document.getElementById('options-list');
const interactionBox = document.getElementById('interaction-box');
const appContainer = document.getElementById('main-app');

if (recognition) {
    startBtn.addEventListener('click', () => { try { recognition.start(); } catch(e){} });

    recognition.onstart = () => {
        statusText.className = "status-active"; statusText.innerText = "🎙️ Listening... Speak your choice phrase clearly in English.";
        btnText.innerText = "System Listening..."; btnIcon.innerText = "🛑"; startBtn.disabled = true;
    };
    recognition.onspeechend = () => {
        recognition.stop(); startBtn.disabled = false;
        btnText.innerText = "Tap to Speak"; btnIcon.innerText = "🎙️";
    };
    recognition.onresult = (event) => {
        const resultText = event.results[0][0].transcript.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").trim();
        transcriptText.innerText = `"${event.results[0][0].transcript}"`;
        processSpeechInput(resultText);
    };
    recognition.onerror = (e) => {
        startBtn.disabled = false; btnText.innerText = "Tap to Speak"; btnIcon.innerText = "🎙️";
        statusText.className = "status-error"; statusText.innerText = "Mic Connection Error: " + e.error;
    };
}

function processSpeechInput(text) {
    const stage = scriptTree[currentStage];
    
    // Xử lý đóng/mở menu thu gọn tại màn xuất phát
    if (stage.isStartNode && text.includes("show")) {
        historyStack.push({ stage: currentStage, score: serviceScore, c1Wrong: c1Wrong, showDestinations: showDestinations });
        showDestinations = !showDestinations;
        updateApplicationState();
        return;
    }

    let matchedKey = null;
    let matchedData = null;

    // Rẽ nhánh kiểm tra bộ Từ khóa Động của Giai đoạn Tình huống 2
    if (stage.isCrisis2) {
        const activeKeywords = c1Wrong ? stage.keywordsHard : stage.keywordsEasy;
        for (let key in activeKeywords) {
            if (text.includes(key)) { matchedKey = activeKeywords[key].next; matchedData = activeKeywords[key]; break; }
        }
    } else {
        for (let key in stage.keywords) {
            if (text.includes(key)) { 
                if (typeof stage.keywords[key] === 'string') {
                    matchedKey = stage.keywords[key];
                    matchedData = {};
                } else {
                    matchedKey = stage.keywords[key].next;
                    matchedData = stage.keywords[key];
                }
                break; 
            }
        }
    }

    if (matchedKey) {
        // Lưu dữ liệu vào ngăn xếp lịch sử phục vụ tính năng Undo phục hồi trạng thái chuyên sâu
        historyStack.push({ stage: currentStage, score: serviceScore, c1Wrong: c1Wrong, showDestinations: showDestinations });
        
        // Thực thi thuật toán tính điểm chuẩn xác theo luật mới
        if (matchedData.wrong) {
            serviceScore = Math.max(0, serviceScore - 1.5);
        }
        if (matchedData.double) {
            serviceScore = Math.max(0, serviceScore - 1.5); // Tổng phạt thành -3.0 cho lỗi kép liên tiếp
        }
        if (matchedData.ecoWrong) {
            serviceScore = Math.max(0, serviceScore - 2.5); // Trừ thẳng tay 2.5 điểm môi trường
        }
        if (matchedData.set_c1_wrong) {
            c1Wrong = true; // Kích hoạt Hard Mode cho tình huống tiếp theo
        }

        currentStage = matchedKey;
        updateApplicationState();
        statusText.className = "status-success"; statusText.innerText = "✅ Phrase matched successfully!";
    } else {
        statusText.className = "status-error"; statusText.innerText = "❌ Phrase not recognized. Read suggestions precisely!";
        playSFX('alert');
    }
}

function updateApplicationState() {
    const stage = scriptTree[currentStage];
    
    // Kích hoạt diễn hoạt Visual (VFX) & Hiệu ứng âm thanh (SFX)
    appContainer.className = "app-container"; void appContainer.offsetWidth; 
    if (stage.vfx) appContainer.classList.add(stage.vfx);
    if (stage.sfx) playSFX(stage.sfx); else playSFX('click');

    // Cập nhật thông số Monitor thời gian thực
    document.getElementById('score-val').innerText = `${serviceScore}/10`;
    document.getElementById('weather-val').innerText = stage.weather || "☀️ Sunny";
    sceneryImg.src = stage.img;
    optionsList.innerHTML = '';
    document.getElementById('back-btn').disabled = (historyStack.length === 0);

    // Xử lý đặc biệt khi tiến nhập màn hình Đánh giá Kết Thúc (Tính 5 thang điểm linh hoạt)
    if (currentStage === 'end_evaluation') {
        const finalTier = evaluationTiers.find(t => serviceScore >= t.min) || evaluationTiers[evaluationTiers.length - 1];
        document.getElementById('speaker-label').innerText = "SYSTEM PERFORMANCE AUDIT";
        storyText.innerHTML = `<strong style="color:var(--primary-color); font-size:1.1rem;">${finalTier.title}</strong><br><br>${finalTier.review}<br><br><span style="color:var(--accent-color); font-weight:bold; font-size:1rem;">💵 Reward Tip: ${finalTier.tip}</span>`;
        interactionBox.innerHTML = `<p style="color: var(--success-color); text-align:center; font-weight:bold; margin-bottom:0;">🎉 Interactive Guiding Loop Finished. Thank you!</p>`;
        startBtn.style.display = 'none';
        appContainer.classList.add(finalTier.color);
        playSFX(finalTier.sfx);
        speak("Tour finished evaluation compiled.", 'male');
        return;
    }

    document.getElementById('speaker-label').innerText = stage.scoreModifier ? "System System Penalty" : "Tourist (Mr. John)";
    storyText.innerText = stage.text;
    interactionBox.style.display = 'block';
    startBtn.style.display = 'inline-flex';

    // RÈ NGHÁNH HIỂN THỊ MENU CHO TỪNG GIAI ĐOẠN KHÁC NHAU
    if (stage.isStartNode) {
        document.getElementById('panel-title').innerText = "🗺️ Destination Check-list:";
        if (!showDestinations) {
            const div = document.createElement('div'); div.className = 'option-line';
            div.innerHTML = `👉 <strong>Show 10 Destination Suggestions</strong> (Say 'Show')`;
            div.onclick = () => processSpeechInput("show");
            optionsList.appendChild(div);
        } else {
            const optionsArray = [
                "We will visit Nguyen Sinh Sac Relic Area.", "Let's explore historic Xeo Quyt Relic Area.",
                "We should go to Gao Giong Eco-tourism Area.", "How about seeing Tram Chim National Park?",
                "Let's enjoy Sa Dec Flower Village fields.", "We can view Huynh Thuy Le Ancient House.",
                "Let's visit Phuoc Kien Lotus Pagoda shrine.", "We will walk around Cao Lanh Bridge Park.",
                "We should discover ancient Go Thap Archeology.", "Let's investigate historical Dong Thap Museum.",
                "[Distraction] Talk about my Bitcoin investment profile.", "[Distraction] Complain about my Toxic Ex-girlfriend issues."
            ];
            optionsArray.forEach(opt => {
                const div = document.createElement('div'); div.className = 'option-line';
                div.innerHTML = `👉 <strong>${opt}</strong>`;
                div.onclick = () => { transcriptText.innerText = `[Click Assist] "${opt}"`; processSpeechInput(opt.toLowerCase()); };
                optionsList.appendChild(div);
            });
            const hideDiv = document.createElement('div'); hideDiv.className = 'option-line';
            hideDiv.style.background = "#fce4d6"; hideDiv.innerHTML = `👉 <strong>Hide Suggestions List</strong> (Say 'Show')`;
            hideDiv.onclick = () => processSpeechInput("show");
            optionsList.appendChild(hideDiv);
        }
    } else if (stage.isCrisis2) {
        document.getElementById('panel-title').innerText = `🔊 CRISIS GIAI ĐOẠN 2 (${c1Wrong ? "🔥 HARD MODE: Double Penalty" : "🍀 EASY MODE"}):`;
        const activeOptions = c1Wrong ? stage.optionsHard : stage.optionsEasy;
        activeOptions.forEach(opt => {
            const div = document.createElement('div'); div.className = 'option-line';
            div.innerHTML = `👉 <strong>${opt}</strong>`;
            div.onclick = () => { transcriptText.innerText = `[Click Assist] "${opt}"`; processSpeechInput(opt.toLowerCase()); };
            optionsList.appendChild(div);
        });
    } else if (stage.options && stage.options.length > 0) {
        document.getElementById('panel-title').innerText = "🔊 Read Aloud Presentation Suggestion:";
        stage.options.forEach(opt => {
            const div = document.createElement('div'); div.className = 'option-line';
            div.innerHTML = `👉 <strong>${opt}</strong>`;
            div.onclick = () => { transcriptText.innerText = `[Click Assist] "${opt}"`; processSpeechInput(opt.toLowerCase()); };
            optionsList.appendChild(div);
        });
    }

    speak(stage.text, 'male');
}

function goBack() {
    if (historyStack.length > 0) {
        const prev = historyStack.pop();
        currentStage = prev.stage; serviceScore = prev.score;
        c1Wrong = prev.c1Wrong; showDestinations = prev.showDestinations;
        startBtn.style.display = 'inline-flex';
        document.getElementById('panel-title').innerText = "🔊 Speak Your Tour Presentation:";
        updateApplicationState();
        statusText.className = ""; statusText.innerText = "Undo executed. State restored.";
    }
}

function resetGame() {
    currentStage = 'start'; serviceScore = 10; c1Wrong = false; historyStack = []; showDestinations = false;
    transcriptText.innerText = "..."; statusText.className = "";
    statusText.innerText = "System reset successfully."; startBtn.style.display = 'inline-flex';
    document.getElementById('panel-title').innerText = "🔊 Speak Your Tour Presentation:";
    updateApplicationState();
}

function speak(text, gender) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US'; utterance.rate = 0.95;
        window.speechSynthesis.speak(utterance);
    }
}

window.addEventListener('DOMContentLoaded', () => {
    updateApplicationState();
});
</script>
