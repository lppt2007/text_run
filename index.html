<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echoes of Tomorrow V2 - Post-Apocalyptic Immersive RPG</title>
    <style>
        :root {
            --bg-color: #111111;
            --text-color: #e0e0e0;
            --accent-color: #ff4757;
            --panel-bg: #1a1a1a;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.8s ease;
        }
        #game-container {
            max-width: 800px;
            width: 100%;
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.5s ease, border-color 0.5s ease;
        }
        #story-img {
            width: 100%;
            height: 380px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 2px solid var(--accent-color);
            transition: border-color 0.5s ease;
        }
        #character-voice {
            font-style: italic;
            color: #ffa502;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        #situation-text {
            font-size: 1.15rem;
            line-height: 1.7;
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
        }
        details {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-left: 4px solid var(--accent-color);
            margin-bottom: 20px;
            border-radius: 0 6px 6px 0;
            transition: border-color 0.5s ease;
        }
        summary {
            font-weight: bold;
            cursor: pointer;
            color: var(--accent-color);
            outline: none;
            user-select: none;
        }
        #hints-list {
            padding-left: 20px;
            margin-top: 10px;
        }
        #hints-list li {
            margin-bottom: 8px;
            cursor: pointer;
            color: #7bed9f;
            transition: 0.2s;
        }
        #hints-list li:hover {
            text-decoration: underline;
            color: #2ed573;
        }
        #controls {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.3s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn:disabled {
            background: #444 !important;
            cursor: not-allowed;
            transform: none;
        }
        .btn:hover:not(:disabled) {
            filter: brightness(1.1);
        }
        .btn:active:not(:disabled) {
            transform: scale(0.98);
        }
        #bgm-btn {
            background: #2f3542;
            border: 1px solid #57606f;
            padding: 8px 16px;
            font-size: 0.85rem;
        }
        #status {
            font-weight: bold;
            color: #2ed573;
            font-size: 0.95rem;
        }
        #transcript {
            margin-top: 15px;
            font-style: italic;
            color: #a4b0be;
            text-align: center;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="margin: 0; color: var(--accent-color); letter-spacing: 2px;">ECHOES OF TOMORROW</h2>
        <button id="bgm-btn" class="btn" onclick="toggleBGM()">🎵 Play Ambient BGM</button>
    </div>

    <!-- Background Audio Loop (Eerie Dark Drone Ambient) -->
    <audio id="bgm" src="https://assets.mixkit.co/music/preview/mixkit-mysterious-ambient-tribal-drone-1224.mp3" loop></audio>

    <img id="story-img" src="" alt="Post-Apocalyptic Cinematic Scene">
    
    <div id="character-voice">Loading Voice Engine...</div>
    <div id="situation-text">Initialising wasteland coordinates...</div>

    <!-- Native toggleable suggestions -->
    <details id="hints-details">
        <summary id="hints-summary">💡 Show Speech Suggestions (Click to reveal)</summary>
        <ul id="hints-list"></ul>
    </details>

    <div id="controls">
        <button id="mic-btn" class="btn" onclick="startListening()">🎤 Start Speaking</button>
        <span id="status">Status: Standby</span>
    </div>
    <div id="transcript">You said: "..."</div>
</div>

let currentState = "main";
let bgmStarted = false;

// --- ADVANCED SPEECH RECOGNITION CONFIG ---
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;
if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
        document.getElementById('status').innerText = "Status: Listening carefully...";
        document.getElementById('mic-btn').disabled = true;
        autoPlayBGMOnInteraction();
    };

    recognition.onresult = (event) => {
        const speechToText = event.results[0][0].transcript.toLowerCase();
        document.getElementById('transcript').innerText = `You said: "${speechToText}"`;
        processInput(speechToText);
    };

    recognition.onerror = (e) => {
        document.getElementById('status').innerText = "Status: Connection dimmed. Try speaking again.";
        document.getElementById('mic-btn').disabled = false;
    };

    recognition.onend = () => {
        document.getElementById('status').innerText = "Status: Standby";
        document.getElementById('mic-btn').disabled = false;
    };
}

// --- CORE GAME ENGINE ---
function updateUI() {
    const node = storyData[currentState];
    
    // Dynamic Theme Transitions (Backgrounds and Accents matched perfectly to situations)
    document.documentElement.style.setProperty('--bg-color', node.theme.bg);
    document.documentElement.style.setProperty('--panel-bg', node.theme.panel);
    document.documentElement.style.setProperty('--accent-color', node.theme.accent);

    document.getElementById('character-voice').innerText = node.speaker + ":";
    document.getElementById('situation-text').innerText = node.text;
    document.getElementById('story-img').src = node.img;
    
    // Config suggestions panel: closed/collapsed by default for normal branches, open for binary branches
    const detailsEl = document.getElementById('hints-details');
    if (currentState.includes('yes_no')) {
        detailsEl.open = true;
        document.getElementById('hints-summary').innerText = "⚠️ Critical Decision Required! Choose your words:";
    } else {
        detailsEl.open = false;
        document.getElementById('hints-summary').innerText = "💡 Show Speech Suggestions (Click to reveal)";
    }

    const hintsList = document.getElementById('hints-list');
    hintsList.innerHTML = "";
    node.hints.forEach(hint => {
        let li = document.createElement('li');
        li.innerText = hint;
        li.onclick = () => {
            document.getElementById('transcript').innerText = `[Clicked Hint] "${hint}"`;
            processInput(hint.toLowerCase());
        };
        hintsList.appendChild(li);
    });

    // Run high-quality local text-to-speech engine
    speak(node.text, node.voiceType);
}

function startListening() {
    if (recognition) recognition.start();
}

function processInput(text) {
    const node = storyData[currentState];
    let matchedBranch = null;

    // Advanced token matching
    for (const key in node.branches) {
        if (text.includes(key)) {
            matchedBranch = node.branches[key];
            break;
        }
    }

    if (matchedBranch) {
        currentState = matchedBranch;
        updateUI();
    } else {
        document.getElementById('status').innerText = "Status: Transmission unclear. Repeat command.";
        speak("I couldn't clarify that transmission. Repeat your choice clearly.", node.voiceType);
    }
}

// --- OPTIMISED CINEMATIC SPEECH ENGINE (GOOGLE AI Fallbacks) ---
function speak(text, gender) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        
        // Slower speech rate and slightly lower pitch mimic premium human studio generation
        utterance.rate = 0.90; 
        
        const voices = window.speechSynthesis.getVoices();
        
        // Primary lookup: Premium cloud-based Google voices integrated into modern browsers
        let selectedVoice = voices.find(v => v.name.includes('Google') && v.lang.includes('en'));
        
        if (gender === 'female') {
            utterance.pitch = 1.02;
            selectedVoice = voices.find(v => v.name.includes('Google US English Female') || v.name.includes('Zira') || (v.lang.includes('en') && v.name.includes('Female'))) || selectedVoice;
        } else {
            utterance.pitch = 0.88; // Deep resonant male voice for Jax
            selectedVoice = voices.find(v => v.name.includes('Google US English Male') || v.name.includes('David') || (v.lang.includes('en') && v.name.includes('Male'))) || selectedVoice;
        }
        
        if (selectedVoice) utterance.voice = selectedVoice;
        window.speechSynthesis.speak(utterance);
    }
}

// --- AUDIO BACKGROUND CONTROL (BGM) ---
function toggleBGM() {
    const bgm = document.getElementById('bgm');
    const btn = document.getElementById('bgm-btn');
    if (bgm.paused) {
        bgm.play().catch(e => console.log("Audio play blocked by security constraints. Action interaction required first."));
        btn.innerText = "🔇 Mute BGM Music";
        btn.style.background = "#e74c3c";
        bgmStarted = true;
    } else {
        bgm.pause();
        btn.innerText = "🎵 Play Ambient BGM";
        btn.style.background = "#2f3542";
    }
}

function autoPlayBGMOnInteraction() {
    if (!bgmStarted) {
        const bgm = document.getElementById('bgm');
        bgm.play().then(() => {
            document.getElementById('bgm-btn').innerText = "🔇 Mute BGM Music";
            document.getElementById('bgm-btn').style.background = "#e74c3c";
            bgmStarted = true;
        }).catch(() => {});
    }
}

// Trigger initial startup
window.speechSynthesis.onvoiceschanged = () => {
    if(document.getElementById('situation-text').innerText === "Initialising wasteland coordinates...") {
        updateUI();
    }
};

window.onload = () => {
    setTimeout(() => {
        if(document.getElementById('situation-text').innerText === "Initialising wasteland coordinates...") {
            updateUI();
        }
    }, 800);
};
