<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đồng Tháp Tour Guide - Interactive Speaking System</title>
    <style>
        :root {
            --primary-color: #1b4d3e; /* Màu xanh lá sen Đồng Tháp trầm ấm */
            --primary-hover: #113327;
            --bg-color: #f4f7f5;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --accent-color: #e67e22;
            --success-color: #27ae60;
            --danger-color: #c0392b;
            --water-color: #2980b9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 12px;
            transition: background 0.5s ease;
        }

        .app-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 520px;
            width: 100%;
            text-align: center;
            border: 1px solid #e2ebf0;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        /* --- VISUAL ANIMATIONS (VFX) --- */
        .shake { animation: shakeAnim 0.4s ease-in-out; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        
        .splash-effect { animation: splashAnim 0.6s ease-out; }
        @keyframes splashAnim {
            0% { box-shadow: inset 0 0 0 0px var(--water-color); filter: brightness(1.5); }
            100% { box-shadow: inset 0 0 0 100px rgba(41, 128, 185, 0); filter: brightness(1); }
        }

        .flash-red { animation: flashRedAnim 0.4s ease-out; }
        @keyframes flashRedAnim { 0% { background: #fadbd8; } 100% { background: var(--card-bg); } }

        .flash-green { animation: flashGreenAnim 0.4s ease-out; }
        @keyframes flashGreenAnim { 0% { background: #d4efdf; } 100% { background: var(--card-bg); } }

        header h1 {
            font-size: 1.4rem;
            color: var(--primary-color);
            margin-bottom: 2px;
            letter-spacing: 0.5px;
        }

        header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        /* --- DASHBOARD MONITOR --- */
        .dashboard-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f0f4f1;
            padding: 8px 14px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid #e2ece4;
        }
        #score-val { color: var(--accent-color); font-size: 1rem; }
        #weather-val { color: #2980b9; }

        .media-container {
            width: 100%;
            height: 240px;
            background-color: #edf2f7;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 12px;
            border: 2px solid #e2ece4;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .character-bubble {
            background: #eef7f2;
            border-left: 4px solid var(--primary-color);
            padding: 14px;
            border-radius: 8px;
            text-align: left;
            margin-bottom: 12px;
        }

        .character-name {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .story-text {
            font-size: 0.95rem;
            line-height: 1.45;
        }

        .interaction-panel {
            background: #fffaf0;
            padding: 14px;
            border-radius: 12px;
            text-align: left;
            margin-bottom: 16px;
            border: 1px dashed #feebc8;
        }

        .interaction-panel p {
            font-weight: 700;
            margin-bottom: 8px;
            color: #dd6b20;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .option-line {
            margin: 8px 0;
            font-size: 0.9rem;
            color: #34495e;
            padding: 8px 10px;
            background: rgba(255,255,255,0.7);
            border-radius: 6px;
            border: 1px solid rgba(226, 116, 32, 0.1);
            line-height: 1.35;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option-line:hover {
            background: #fff;
            border-color: var(--accent-color);
            transform: translateX(3px);
        }

        .controls {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .voice-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            flex: 2;
            padding: 14px;
            font-size: 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(27, 77, 62, 0.2);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .voice-btn:active {
            background-color: var(--primary-hover);
            transform: scale(0.98);
        }

        .voice-btn:disabled {
            background-color: #cbd5e0;
            box-shadow: none;
            cursor: not-allowed;
        }

        .utility-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid #dcdde1;
            padding: 12px;
            font-size: 0.85rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .utility-btn:hover:not(:disabled) {
            background: #f1f2f6;
            color: var(--text-main);
        }
        .utility-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .status-box {
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            background: #f8f9fa;
            width: 100%;
            border: 1px solid #e8ecef;
        }

        .status-active { color: var(--accent-color); font-weight: 600; animation: pulse 1.5s infinite; }
        .status-success { color: var(--success-color); font-weight: 600; }
        .status-error { color: var(--danger-color); font-weight: 600; }

        .transcript-zone { margin-top: 4px; font-size: 0.8rem; color: var(--text-muted); }
        .transcript-text { font-weight: bold; color: var(--danger-color); }

        #bgm-toggle-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255,255,255,0.8); border: 1px solid #ccc;
            border-radius: 20px; padding: 4px 10px; font-size: 0.7rem; cursor: pointer;
        }

        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body>

<div class="app-container" id="main-app">
    <button id="bgm-toggle-btn" onclick="toggleBGM()">🎵 BGM: Off</button>

        <h1>🎙️ Đồng Tháp Tour Guide</h1>
        <p>Interactive English Guiding System</p>
    </header>

    </div>
        
    <div class="media-container">

    </div>

        <div class="character-name" id="speaker-label">Tourist (Mr. John)</div>

    </div>

    </div>

    <div class="controls">

        <button id="start-btn" class="voice-btn">
            <span id="btn-icon">🎙️</span> <span id="btn-text">Tap to Speak</span>
        </button>
        <button class="utility-btn" onclick="resetGame()">🔄 Reset</button>
    </div>
        
    <div class="status-box">
        <div id="status-text">Ready. Please allow microphone permission when prompted.</div>
        <div class="transcript-zone">System heard: <span id="transcript-text" class="transcript-text">...</span></div>
    </div>
</div>

// --- WEB AUDIO API SYNTHESIZER ENGINE ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSFX(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;

    if (type === 'click') {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(500, now); gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
        osc.start(); osc.stop(now + 0.06);
    } else if (type === 'splash') {
        // Tạo tiếng nước văng xối xả bằng nhiễu trắng lọc băng tần
        const bufferSize = audioCtx.sampleRate * 0.5;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
        const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 1200;
        const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.6, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
        noise.start(); noise.stop(now + 0.5);
    } else if (type === 'rain') {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'triangle'; osc.frequency.setValueAtTime(90, now);
        gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.6);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.6);
    } else if (type === 'alert') {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, now);
        gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.3);
    } else if (type === 'applause') {
        // Âm thanh chúc mừng/tiền bo leng keng
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(1200, now);
        osc.frequency.exponentialRampToValueAtTime(1800, now + 0.3);
        gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.4);
    }
}

// Hệ thống phát BGM giả lập (Acoustic Nature Vibe) không phụ thuộc mạng
let bgmInterval = null;
let isBGMOn = false;
function toggleBGM() {
    isBGMOn = !isBGMOn;
    document.getElementById('bgm-toggle-btn').innerText = isBGMOn ? "🎵 BGM: Active" : "🎵 BGM: Off";
    if (isBGMOn) {
        bgmInterval = setInterval(() => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const notes = [293.66, 329.63, 392.00, 440.00]; // Hợp âm G Major tươi mát vùng sông nước
            const note = notes[Math.floor(Math.random() * notes.length)];
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(note, now);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.04, now + 0.2);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 1.3);
        }, 600);
    } else {
        clearInterval(bgmInterval);
    }
}

// Cấu hình Thang điểm 5 bậc linh hoạt
const evaluationTiers = [
    { min: 9, title: "🏆 Tier 5: World-Class Guide", review: "John: 'Absolutely flawless tour guide! Managed all unexpected crises safely with native-like English. Highly recommended!'", tip: "$50 Max Tip!", sfx: 'applause', color: 'flash-green' },
    { min: 7, title: "🥇 Tier 4: Professional Guide", review: "John: 'Very good experience. Informative, spoke clearly, and handled emergencies well. Thank you!'", tip: "$30 Tip.", sfx: 'applause', color: 'flash-green' },
    { min: 5, title: "🥈 Tier 3: Average Service", review: "John: 'The tour was okay, but some crisis management was a bit clumsy and delayed. Adequate.'", tip: "$10 Basic Tip.", sfx: 'click', color: 'flash-green' },
    { min: 3, title: "🥉 Tier 2: Poor Performance", review: "John: 'Distracted guide. Got confused during unexpected situations and wasted time on irrelevant personal gossip.'", tip: "$2 Insulting Tip.", sfx: 'alert', color: 'flash-red' },
    { min: 0, title: "❌ Tier 1: Terrible Service", review: "John: 'Unprofessional, left me wet or unsafe, and lacked basic courtesy. I want a full refund!'", tip: "$0 No Tip.", sfx: 'alert', color: 'shake' }
];

// --- QUẢN LÝ TRẠNG THÁI & LOGIC TƯƠNG TÁC ---
let currentStage = 'start';
let serviceScore = 10;
let historyStack = [];

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
if (SpeechRecognition) {
    recognition = new SpeechRecognition(); recognition.lang = 'en-US';
    recognition.interimResults = false; recognition.maxAlternatives = 1;
}

const startBtn = document.getElementById('start-btn');
const btnText = document.getElementById('btn-text');
const btnIcon = document.getElementById('btn-icon');
const statusText = document.getElementById('status-text');
const transcriptText = document.getElementById('transcript-text');
const sceneryImg = document.getElementById('scenery-img');
const storyText = document.getElementById('story');
const optionsList = document.getElementById('options-list');
const interactionBox = document.getElementById('interaction-box');
const appContainer = document.getElementById('main-app');

if (recognition) {
    startBtn.addEventListener('click', () => { try { recognition.start(); } catch(e){} });

    recognition.onstart = () => {
        statusText.className = "status-active"; statusText.innerText = "🎙️ Listening... Speak your choice phrase clearly in English.";
        btnText.innerText = "Listening closely..."; btnIcon.innerText = "🛑"; startBtn.disabled = true;
    };
    recognition.onspeechend = () => {
        recognition.stop(); startBtn.disabled = false;
        btnText.innerText = "Tap to Speak"; btnIcon.innerText = "🎙️";
    };
    recognition.onresult = (event) => {
        const resultText = event.results[0][0].transcript.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").trim();
        transcriptText.innerText = `"${event.results[0][0].transcript}"`;
        processSpeechInput(resultText);
    };
    recognition.onerror = (e) => {
        startBtn.disabled = false; btnText.innerText = "Tap to Speak"; btnIcon.innerText = "🎙️";
        statusText.className = "status-error"; statusText.innerText = "Microphone Error: " + e.error;
    };
}

function processSpeechInput(text) {
    const stage = scriptTree[currentStage];
    let matchedKey = null;
    for (let key in stage.keywords) {
        if (text.includes(key)) { matchedKey = stage.keywords[key]; break; }
    }

    if (matchedKey) {
        // Ghi nhận lịch sử phục vụ việc Undo
        historyStack.push({ stage: currentStage, score: serviceScore });
        currentStage = matchedKey;
        
        // Cập nhật điểm số nếu có modifier từ cấu hình node mới
        const nextStage = scriptTree[currentStage];
        if (nextStage && nextStage.scoreModifier !== undefined) {
            serviceScore = Math.max(0, Math.min(10, serviceScore + nextStage.scoreModifier));
        }

        updateApplicationState();
        statusText.className = "status-success"; statusText.innerText = "✅ Successfully matched voice command!";
    } else {
        statusText.className = "status-error"; statusText.innerText = "❌ Phrase did not match suggestions. Please try reading again clearly!";
        playSFX('alert');
    }
}

function updateApplicationState() {
    const stage = scriptTree[currentStage];
    
    // Khởi chạy hiệu ứng hình ảnh (VFX) và âm thanh đặc trưng (SFX)
    appContainer.className = "app-container"; void appContainer.offsetWidth; // Force Reflow
    if (stage.vfx) appContainer.classList.add(stage.vfx);
    if (stage.sfx) playSFX(stage.sfx); else playSFX('click');

    // Đồng bộ thông số Dashboard
    document.getElementById('score-val').innerText = `${serviceScore}/10`;
    document.getElementById('weather-val').innerText = stage.weather || "☀️ Sunny";
    
    sceneryImg.src = stage.img;
    optionsList.innerHTML = '';
    document.getElementById('back-btn').disabled = (historyStack.length === 0);

    if (currentStage === 'end_evaluation') {
        // Kích hoạt bộ xử lý logic tính toán thang điểm 5 bậc cuối cùng
        const finalTier = evaluationTiers.find(t => serviceScore >= t.min) || evaluationTiers[evaluationTiers.length - 1];
        
        document.getElementById('speaker-label').innerText = "System Audit Evaluation";
        storyText.innerHTML = `<strong style="color:var(--primary-color);">${finalTier.title}</strong><br><br>${finalTier.review}<br><br><span style="color:var(--accent-color); font-weight:bold;">💵 Tipping Reward: ${finalTier.tip}</span>`;
        interactionBox.innerHTML = `<p style="color: var(--success-color); text-align:center; font-weight:bold; margin-bottom:0;">🎉 Congratulations! You have successfully completed the tourist guiding loop.</p>`;
        startBtn.style.display = 'none';
        
        appContainer.className = "app-container"; void appContainer.offsetWidth;
        appContainer.classList.add(finalTier.color);
        playSFX(finalTier.sfx);
        speak("Tour evaluation complete.", 'male');
        return;
    }

    // Luồng hội thoại bình thường
    document.getElementById('speaker-label').innerText = currentStage.includes('_bad') || currentStage.includes('_good') ? "John (Visitor)" : (stage.scoreModifier ? "System Warning" : "John (Visitor)");
    storyText.innerText = stage.text;
    interactionBox.style.display = 'block';
    startBtn.style.display = 'inline-flex';

    if (stage.options && stage.options.length > 0) {
        stage.options.forEach(option => {
            const div = document.createElement('div');
            div.className = 'option-line';
            div.innerHTML = `👉 <strong>${option}</strong>`;
            div.onclick = () => {
                transcriptText.innerText = `[Click Assist] "${option}"`;
                processSpeechInput(option.toLowerCase());
            };
            optionsList.appendChild(div);
        });
    }

    // Đọc thoại AI giọng máy trầm ấm hỗ trợ nghe ngấm cốt truyện
    speak(stage.text, 'male');
}

function goBack() {
    if (historyStack.length > 0) {
        playSFX('click');
        const prev = historyStack.pop();
        currentStage = prev.stage;
        serviceScore = prev.score;
        
        // Nếu phục hồi từ màn hình cuối, bật lại nút nói
        startBtn.style.display = 'inline-flex';
        interactionBox.innerHTML = `<p>🔊 Read Aloud Your Tour Presentation:</p><div id="options-list"></div>`;
        
        updateApplicationState();
        statusText.className = ""; statusText.innerText = "Undo executed. State reverted.";
    }
}

function resetGame() {
    currentStage = 'start'; serviceScore = 10; historyStack = [];
    transcriptText.innerText = "..."; statusText.className = "";
    statusText.innerText = "System reset. Ready for talk loop.";
    startBtn.style.display = 'inline-flex';
    interactionBox.innerHTML = `<p>🔊 Read Aloud Your Tour Presentation:</p><div id="options-list"></div>`;
    updateApplicationState();
}

function speak(text, gender) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US'; utterance.rate = 0.92;
        const voices = window.speechSynthesis.getVoices();
        let voice = voices.find(v => v.name.includes('Google US English Male') || v.name.includes('David') || (v.lang.includes('en') && v.name.includes('Male')));
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
    }
}

window.addEventListener('DOMContentLoaded', () => {
    updateApplicationState();
});
</script>
