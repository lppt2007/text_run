<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echoes of Tomorrow V3 - Cyber Apocalypse RPG</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --panel-bg: #161920;
            --accent-color: #ff4757;
            --text-color: #e0e6ed;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.6s ease;
        }
        #game-container {
            max-width: 850px;
            width: 100%;
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 35px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.5s ease;
            position: relative;
        }
        /* --- VISUAL EFFECTS (VFX) --- */
        .shake {
            animation: shakeAnim 0.4s ease-in-out;
        }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .flash-red { animation: flashRedAnim 0.4s ease-out; }
        @keyframes flashRedAnim { 0% { background: #ff4757; } 100% { background: var(--panel-bg); } }
        
        .flash-white { animation: flashWhiteAnim 0.3s ease-out; }
        @keyframes flashWhiteAnim { 0% { filter: brightness(3); } 100% { filter: brightness(1); } }

        .flash-green { animation: flashGreenAnim 0.5s ease-out; }
        @keyframes flashGreenAnim { 0% { background: #2ed573; } 100% { background: var(--panel-bg); } }

        /* --- UI COMPONENTS --- */
        #status-panel {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.4);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .status-bar { font-weight: bold; font-size: 0.9rem; }
        #health-val { color: #ff4754; }
        #sanity-val { color: #54a0ff; }
        #supply-val { color: #ffa502; }

        #story-img {
            width: 100%;
            height: 380px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 2px solid var(--accent-color);
            transition: border-color 0.5s ease;
        }
        #character-voice {
            font-style: italic;
            color: #ffa502;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 1.1rem;
        }
        #situation-text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        details {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-left: 4px solid var(--accent-color);
            margin-bottom: 25px;
            border-radius: 0 6px 6px 0;
        }
        summary { font-weight: bold; cursor: pointer; color: var(--accent-color); user-select: none; }
        #hints-list { padding-left: 20px; margin-top: 10px; }
        #hints-list li { margin-bottom: 8px; cursor: pointer; color: #7bed9f; }
        #hints-list li:hover { text-decoration: underline; }

        #controls {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .btn:disabled { background: #444 !important; cursor: not-allowed; opacity: 0.5; }
        .btn:hover:not(:disabled) { filter: brightness(1.1); }
        #back-btn { background: #57606f; }
        #bgm-btn { background: #2f3542; font-size: 0.85rem; padding: 8px 14px; }
        #status { font-weight: bold; color: #2ed573; }
        #transcript { margin-top: 15px; font-style: italic; color: #a4b0be; text-align: center; }
    </style>
</head>
<body>

<div id="game-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="margin: 0; color: var(--accent-color); letter-spacing: 2px;">ECHOES OF TOMORROW (V3)</h2>
        <button id="bgm-btn" class="btn" onclick="toggleBGM()">🎵 Start Ambient BGM</button>
    </div>

    <div id="status-panel">
        <div class="status-bar">❤️ HP: <span id="health-val">100%</span></div>
        <div class="status-bar">🧠 SANITY: <span id="sanity-val">100%</span></div>
        <div class="status-bar">🎒 SUPPLIES: <span id="supply-val">100%</span></div>
    </div>

    <img id="story-img" src="" alt="Wasteland Scene">
    
    <div id="character-voice">Loading Core Engine...</div>
    <div id="situation-text">Booting simulation protocols...</div>

    <details id="hints-details">
        <summary id="hints-summary">💡 Show Speech Suggestions (Click to open)</summary>
        <ul id="hints-list"></ul>
    </details>

    <div id="controls">
        <button id="back-btn" class="btn" onclick="goBack()" disabled>⬅️ Back (Undo)</button>
        <button id="mic-btn" class="btn" onclick="startListening()">🎤 Start Speaking</button>
        <span id="status">Status: Standby</span>
    </div>
    <div id="transcript">You said: "..."</div>
</div>

<script>
// --- CHƯƠNG TRÌNH TỔNG HỢP SFX KỸ THUẬT SỐ (WEB AUDIO API) ---
// Đảm bảo tiếng súng, vụ nổ phát ra to rõ 100%, không lo lỗi link chết hoặc load chậm
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSFX(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;

    if (type === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'gunshot') {
        // Tạo tiếng súng nổ đanh gọn bằng tiếng ồn trắng giả lập kỹ thuật số cường độ lớn
        const bufferSize = audioCtx.sampleRate * 0.4;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
        
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 1000;

        const noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(1.5, now); // Volume súng bắn cực lớn cực rõ
        noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);

        noise.connect(filter); filter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
        noise.start(now); noise.stop(now + 0.4);
    } else if (type === 'explosion') {
        // Tiếng nổ trầm sâu, rung chấn
        const bufferSize = audioCtx.sampleRate * 1.5;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass'; filter.frequency.value = 200;
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(1.8, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 1.2);
        noise.connect(filter); filter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
        noise.start(now); noise.stop(now + 1.5);
    } else if (type === 'alert') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.linearRampToValueAtTime(300, now + 0.3);
        gain.gain.setValueAtTime(0.4, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc.start(now); osc.stop(now + 0.4);
    }
}

// --- HỆ THỐNG TRÌNH PHÁT NHẠC NỀN DỰ PHÒNG CHỐNG LỖI TẢI TỪ MẠNG ---
let syntheticBGMInterval = null;
let bgmAudioNode = null;
let isPlayingBGM = false;

function toggleBGM() {
    const btn = document.getElementById('bgm-btn');
    if (!isPlayingBGM) {
        isPlayingBGM = true;
        btn.innerText = "🔇 Mute BGM Music";
        btn.style.background = "#e74c3c";
        playCurrentStateBGM();
    } else {
        isPlayingBGM = false;
        btn.innerText = "🎵 Start Ambient BGM";
        btn.style.background = "#2f3542";
        stopAllBGM();
    }
}

function stopAllBGM() {
    if (syntheticBGMInterval) { clearInterval(syntheticBGMInterval); syntheticBGMInterval = null; }
    if (bgmAudioNode) { try { bgmAudioNode.pause(); } catch(e){} }
}

function playCurrentStateBGM() {
    if (!isPlayingBGM) return;
    stopAllBGM();

    const node = storyData[currentState];
    // Xác định kiểu nhạc cần phát dựa trên tính chất node
    if (currentState.includes('_win')) {
        // Nhạc hi vọng, tươi sáng (Hợp âm rải Sine ấm áp)
        playSyntheticDrone([261.63, 329.63, 392.00, 523.25], 'sine', 0.15, 1200);
    } else if (currentState.includes('_dead') || currentState.includes('_lose')) {
        // Nhạc rợn tóc gáy, creepypasta âm u độc hại
        playSyntheticDrone([65.41, 73.42, 55.00], 'sawtooth', 0.12, 2500);
    } else {
        // Nhạc nền sinh tồn thông thường âm hưởng trống trải bụi bặm
        playSyntheticDrone([110.00, 130.81, 146.83], 'triangle', 0.2, 2000);
    }
}

function playSyntheticDrone(freqs, type, volume, intervalTime) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    function triggerChord() {
        freqs.forEach(f => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(f + (Math.random() * 2 - 1), audioCtx.currentTime);
            
            // Bộ lọc thông thấp tạo hiệu ứng ma mị mờ ảo bóp nghẹt âm thanh
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = (type === 'sawtooth') ? 180 : 400;

            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(volume / freqs.length, audioCtx.currentTime + 1.0);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (intervalTime/1000) * 1.8);

            osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + (intervalTime/1000) * 1.9);
        });
    }
    triggerChord();
    syntheticBGMInterval = setInterval(triggerChord, intervalTime);
}

// --- CẤU TRÚC KỊCH BẢN CHUẨN ĐÚNG TOÁN HỌC: 10 NHÁNH, MỖI NHÁNH 5 OPT, MỖI 5 RẼ 3 (2 YES/NO, 1 FAST END) ---
const storyData = {
    main: {
        speaker: "Jax",
        text: "The surface air is pure static, and the bunker is dead. We must choose our sector now! Do we go to the Forest, City, Metro, Highway, River, Hospital, Laboratory, Military Base, Swamp, or Cathedral?",
        img: "https://images.unsplash.com/photo-1518156677180-95a2893f3e9f?w=800",
        voiceType: 'male',
        theme: { bg: "#0d0e12", panel: "#161920", accent: "#ff4757" },
        status: { health: 100, sanity: 100, supplies: 100 },
        branches: {
            "forest": "b_forest", "city": "b_city", "metro": "b_metro", "highway": "b_highway", "river": "b_river",
            "hospital": "b_hospital", "lab": "b_lab", "base": "b_base", "swamp": "b_swamp", "cathedral": "b_cathedral"
        },
        hints: ["Go to the forest", "Explore the city", "Enter the metro", "Take the highway", "Follow the river", "Search the hospital", "Investigate the lab", "Infiltrate the base", "Cross the swamp", "Check the cathedral"]
    }
};

// Hàm tiện ích tạo dữ liệu tự động cho 10 nhánh chuẩn cấu trúc phân lớp không trùng lặp
const sectorsConfig = [
    { id: "forest", name: "Dark Forest", img: "https://images.unsplash.com/photo-1511497584788-876760111969?w=800", bg: "#09140e", p: "#12241a", a: "#2ecc71", words: ["climb", "hide", "run", "scout", "burn"], sfx: ['click','click','click','alert','gunshot'] },
    { id: "city", name: "Ruined City", img: "https://images.unsplash.com/photo-1518364538800-6bcb3f41df49?w=800", bg: "#1a1b1e", p: "#25272c", a: "#f1c40f", words: ["store", "alley", "roof", "snipe", "scream"], sfx: ['click','click','click','alert','gunshot'] },
    { id: "metro", name: "Subway Metro", img: "https://images.unsplash.com/photo-1551135049-8a33b5883817?w=800", bg: "#08080a", p: "#121317", a: "#95a5a6", words: ["track", "room", "tunnel", "vent", "blast"], sfx: ['click','click','click','alert','explosion'] },
    { id: "highway", name: "Desert Highway", img: "https://images.unsplash.com/photo-1509316975850-ff9c5deb0cd9?w=800", bg: "#231810", p: "#332318", a: "#e67e22", words: ["truck", "diner", "bridge", "drive", "dig"], sfx: ['click','click','click','alert','explosion'] },
    { id: "river", name: "Toxic River", img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800", bg: "#07170f", p: "#11261a", a: "#00ff66", words: ["boat", "swim", "raft", "bridge", "drink"], sfx: ['click','click','click','alert','alert'] },
    { id: "hospital", name: "Abandoned Hospital", img: "https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?w=800", bg: "#14191c", p: "#1f272b", a: "#9b59b6", words: ["ward", "pharmacy", "clinic", "icu", "sabotage"], sfx: ['click','click','click','alert','gunshot'] },
    { id: "lab", name: "Secret Laboratory", img: "https://images.unsplash.com/photo-1532187863486-abf9d39d6618?w=800", bg: "#0a131a", p: "#12202b", a: "#3498db", words: ["serum", "vault", "terminal", "pod", "smash"], sfx: ['click','click','click','alert','explosion'] },
    { id: "base", name: "Military Base", img: "https://images.unsplash.com/photo-1590674899484-d5640e854abe?w=800", bg: "#191a16", p: "#282a22", a: "#78e08f", words: ["armory", "hangar", "bunker", "tower", "breach"], sfx: ['click','click','click','alert','gunshot'] },
    { id: "swamp", name: "Overgrown Swamp", img: "https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?w=800", bg: "#0b120c", p: "#142116", a: "#10ac84", words: ["mud", "shack", "mangrove", "wade", "poison"], sfx: ['click','click','click','alert','alert'] },
    { id: "cathedral", name: "Crumbling Cathedral", img: "https://images.unsplash.com/photo-1548625361-155deee2627e?w=800", bg: "#1c141a", p: "#2d2029", a: "#e84118", words: ["altar", "crypt", "tower", "relic", "desecrate"], sfx: ['click','click','click','alert','gunshot'] }
];

sectorsConfig.forEach(s => {
    // 1. Tạo node nhánh chính (Mức 1)
    storyData[`b_${s.id}`] = {
        speaker: s.id === "hospital" ? "Elena" : (s.id === "lab" ? "Dr. Vance" : "Jax"),
        text: `We entered the ${s.name}. The atmosphere is heavy. We have 5 tactical choices here. Look at the data grid. What is our play?`,
        img: s.img,
        voiceType: (s.id === "hospital" || s.id === "lab") ? 'female' : 'male',
        theme: { bg: s.bg, panel: s.p, accent: s.a },
        status: { health: -10, sanity: -5, supplies: -10 },
        hints: [`Use ${s.words[0]} approach`, `Try ${s.words[1]} route`, `Execute ${s.words[2]} tactic`, `Initiate ${s.words[3]} scanning`, `Risk ${s.words[4]} override`],
        branches: {},
        sfxTrigger: 'click'
    };
    
    // Gán 5 nhánh phản hồi theo cấu trúc chuẩn bài toán yêu cầu:
    // Thỏa mãn: Trong 5 nhánh -> 3 nhánh được chọn đi tiếp (2 đi tới node Yes/No, 1 đi tới Fast Ending cốt truyện). 2 nhánh còn lại là Fast Death tức thì.
    s.words.forEach((w, idx) => {
        const key = w.toLowerCase();
        if (idx === 0 || idx === 1) {
            // 2 nhánh dẫn tới tổ hợp Yes/No quyết định (Level 2)
            storyData[`b_${s.id}`].branches[key] = `node_${s.id}_yn_${idx}`;
            
            storyData[`node_${s.id}_yn_${idx}`] = {
                speaker: "System Display",
                text: `Tactical option [${w.toUpperCase()}] succeeded! Scanning localized core... A critical anomaly detected. Do you authorize final containment sequence? Say YES or NO!`,
                img: s.img,
                voiceType: 'male',
                theme: { bg: s.bg, panel: s.p, accent: s.a },
                status: { health: 10, sanity: 20, supplies: 0 },
                hints: ["Say YES", "Say NO"],
                branches: { "yes": `end_${s.id}_win`, "no": `end_${s.id}_lose` },
                sfxTrigger: s.sfx[idx]
            };
        } else if (idx === 2) {
            // 1 nhánh dẫn thẳng đến kết cục nhanh (Fast Ending cốt truyện)
            storyData[`b_${s.id}`].branches[key] = `end_${s.id}_fast`;
            
            storyData[`end_${s.id}_fast`] = {
                speaker: "Narrator",
                text: `The choice to [${w.toUpperCase()}] immediately bypassed the sector's power matrix! You managed an automated swift extraction back to safety. FAST ENDING SECURED.`,
                img: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800",
                voiceType: 'male',
                theme: { bg: "#051c0e", panel: "#0d381e", accent: "#2ecc71" },
                status: { health: 0, sanity: 50, supplies: 20 },
                hints: ["Simulate Again"],
                branches: { "simulate": "main" },
                sfxTrigger: s.sfx[idx]
            };
        } else {
            // 2 nhánh còn lại dẫn đến Cái chết lập tức (Insta-Death/Fast Dead Ending)
            storyData[`b_${s.id}`].branches[key] = `end_${s.id}_dead_${idx}`;
            
            storyData[`end_${s.id}_dead_${idx}`] = {
                speaker: "Terminal Alert",
                text: `FATAL ERROR: The choice [${w.toUpperCase()}] triggered an instantaneous kinetic strike or defense grid overload. Your neural signatures ceased. CRITICAL FAILURE / DEAD END.`,
                img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800",
                voiceType: 'male',
                theme: { bg: "#2d0000", panel: "#1a0000", accent: "#ff0000" },
                status: { health: -100, sanity: -100, supplies: -100 },
                hints: ["Reboot System"],
                branches: { "reboot": "main" },
                sfxTrigger: s.sfx[idx] // Kích hoạt tiếng súng nổ/vụ nổ cực mạnh đã cấu hình
            };
        }
    });

    // 2. Tạo kết quả tổ hợp Độc nhất cho các đầu cuối Win/Lose (Unique Endings)
    storyData[`end_${s.id}_win`] = {
        speaker: "Narrator",
        text: `EPILOGUE - SUCCESS IN ${s.name.toUpperCase()}: Your definitive YES decision clean-purged the regional bio-threat. Fresh oxygen cascades through the sector. YOU WIN!`,
        img: "https://images.unsplash.com/photo-1502082553048-f009c37129b9?w=800", voiceType: 'male',
        theme: { bg: "#051c0e", panel: "#0d381e", accent: "#2ecc71" },
        status: { health: 100, sanity: 100, supplies: 100 },
        hints: ["Restart Simulation"], branches: { "restart": "main" }, sfxTrigger: 'click'
    };
    storyData[`end_${s.id}_lose`] = {
        speaker: "Narrator",
        text: `EPILOGUE - ABANDONED IN ${s.name.toUpperCase()}: You played it safe with a NO. The darkness permanently consumed the infrastructure, forcing you into exile. GAME OVER.`,
        img: "https://images.unsplash.com/photo-1518241353330-0f7941c2d9b5?w=800", voiceType: 'male',
        theme: { bg: "#1a1a1a", panel: "#2b2b2b", accent: "#7f8c8d" },
        status: { health: 10, sanity: 0, supplies: 5 },
        hints: ["Restart Simulation"], branches: { "restart": "main" }, sfxTrigger: 'alert'
    };
});

// --- STATE MANAGEMENT & LOGIC GAME ---
let currentState = "main";
let historyStack = []; // Lưu trữ lịch sử lựa chọn để hỗ trợ tính năng Back (Undo) lập tức
let currentStatus = { health: 100, sanity: 100, supplies: 100 };

function updateUI(isUndo = false) {
    const node = storyData[currentState];
    const container = document.getElementById('game-container');

    // 1. Áp dụng hiệu ứng Visual (VFX) dựa trên tính chất hành động
    container.className = ""; // Reset class cũ
    void container.offsetWidth; // Trigger reflow ép cập nhật CSS animation
    
    if (currentState.includes('_dead')) {
        container.classList.add('shake', 'flash-red');
    } else if (currentState.includes('_win') || currentState.includes('_fast')) {
        container.classList.add('flash-green');
    } else if (currentState !== 'main' && !isUndo) {
        container.classList.add('flash-white');
    }

    // 2. Kích hoạt hiệu ứng âm thanh (SFX) tương ứng nếu có cấu hình
    if (!isUndo && node.sfxTrigger) {
        playSFX(node.sfxTrigger);
    }

    // 3. Cập nhật và tích lũy trạng thái Status của bản thân người dùng
    if (!isUndo && node.status) {
        currentStatus.health = Math.max(0, Math.min(100, currentStatus.health + node.status.health));
        currentStatus.sanity = Math.max(0, Math.min(100, currentStatus.sanity + node.status.sanity));
        currentStatus.supplies = Math.max(0, Math.min(100, currentStatus.supplies + node.status.supplies));
    }
    
    // Hiển thị Status lên bảng điều khiển
    document.getElementById('health-val').innerText = currentStatus.health + "%";
    document.getElementById('sanity-val').innerText = currentStatus.sanity + "%";
    document.getElementById('supply-val').innerText = currentStatus.supplies + "%";

    // 4. Đồng bộ màu nền CSS biến đổi theo mảng vùng đất đang đứng
    document.documentElement.style.setProperty('--bg-color', node.theme.bg);
    document.documentElement.style.setProperty('--panel-bg', node.theme.panel);
    document.documentElement.style.setProperty('--accent-color', node.theme.accent);

    // 5. Cập nhật text nội dung kịch bản
    document.getElementById('character-voice').innerText = node.speaker + ":";
    document.getElementById('situation-text').innerText = node.text;
    document.getElementById('story-img').src = node.img;
    
    // Quản lý trạng thái đóng/mở của thanh gợi ý hội thoại (Mặc định đóng, tự mở khi gặp Yes/No)
    const detailsEl = document.getElementById('hints-details');
    if (currentState.includes('_yn_')) {
        detailsEl.open = true;
        document.getElementById('hints-summary').innerText = "⚠️ SYSTEM COMMAND REQUIRED! Speak clearly:";
    } else {
        detailsEl.open = false;
        document.getElementById('hints-summary').innerText = "💡 Show Speech Suggestions (Click to open)";
    }

    const hintsList = document.getElementById('hints-list');
    hintsList.innerHTML = "";
    node.hints.forEach(hint => {
        let li = document.createElement('li');
        li.innerText = hint;
        li.onclick = () => {
            document.getElementById('transcript').innerText = `[Click Input] "${hint}"`;
            processInput(hint.toLowerCase());
        };
        hintsList.appendChild(li);
    });

    // 6. Cập nhật trạng thái nút Back (Undo)
    document.getElementById('back-btn').disabled = (historyStack.length === 0);

    // 7. Đồng bộ hệ thống nhạc nền ma mị thay đổi trạng thái theo cốt truyện
    playCurrentStateBGM();

    // 8. Đọc thoại AI
    speak(node.text, node.voiceType);
}

// Tính năng Quay lại lựa chọn đã làm (Undo testing nhanh)
function goBack() {
    if (historyStack.length > 0) {
        playSFX('click');
        const previousState = historyStack.pop();
        currentState = previousState.state;
        currentStatus = { ...previousState.status }; // Phục hồi lại chỉ số status trước đó
        updateUI(true);
    }
}

function startListening() {
    if (recognition) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        recognition.start();
    }
}

function processInput(text) {
    const node = storyData[currentState];
    let matchedBranch = null;

    for (const key in node.branches) {
        if (text.includes(key)) {
            matchedBranch = node.branches[key];
            break;
        }
    }

    if (matchedBranch) {
        // Lưu lại dữ liệu trước khi chuyển đổi state mới sang historyStack
        historyStack.push({
            state: currentState,
            status: { ...currentStatus }
        });

        currentState = matchedBranch;
        updateUI();
    } else {
        document.getElementById('status').innerText = "Status: Static detected. Repeat.";
        playSFX('alert');
        speak("Transmission fuzzy. Repeat command.", node.voiceType);
    }
}

// --- ENGINE NHẬN DIỆN GIỌNG NÓI ---
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;
if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
        document.getElementById('status').innerText = "Status: Listening...";
        document.getElementById('mic-btn').disabled = true;
    };
    recognition.onresult = (event) => {
        const speechToText = event.results[0][0].transcript.toLowerCase();
        document.getElementById('transcript').innerText = `You said: "${speechToText}"`;
        processInput(speechToText);
    };
    recognition.onerror = () => {
        document.getElementById('status').innerText = "Status: Error. Try again.";
        document.getElementById('mic-btn').disabled = false;
    };
    recognition.onend = () => {
        document.getElementById('status').innerText = "Status: Standby";
        document.getElementById('mic-btn').disabled = false;
    };
} else {
    alert("Web Speech API not fully supported. Please use Google Chrome.");
}

// --- ENGINE PHÁT GIỌNG AI CHUẨN ĐIỆN ẢNH ---
function speak(text, gender) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.88; // Đọc chậm rãi, nhấn nhá tạo chiều sâu không khí hậu tận thế
        
        const voices = window.speechSynthesis.getVoices();
        let selectedVoice = voices.find(v => v.name.includes('Google') && v.lang.includes('en'));
        
        if (gender === 'female') {
            utterance.pitch = 1.0;
            selectedVoice = voices.find(v => v.name.includes('Google US English Female') || v.name.includes('Zira') || (v.lang.includes('en') && v.name.includes('Female'))) || selectedVoice;
        } else {
            utterance.pitch = 0.82; // Hạ giọng trầm sâu cho Jax
            selectedVoice = voices.find(v => v.name.includes('Google US English Male') || v.name.includes('David') || (v.lang.includes('en') && v.name.includes('Male'))) || selectedVoice;
        }
        
        if (selectedVoice) utterance.voice = selectedVoice;
        window.speechSynthesis.speak(utterance);
    }
}

// Khởi chạy hệ thống sau khi voice dữ liệu sẵn sàng
window.speechSynthesis.onvoiceschanged = () => {
    if(document.getElementById('situation-text').innerText === "Booting simulation protocols...") {
        updateUI();
    }
};
window.onload = () => {
    setTimeout(() => {
        if(document.getElementById('situation-text').innerText === "Booting simulation protocols...") {
            updateUI();
        }
    }, 800);
};
